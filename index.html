<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Sense Levelup.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; }
        .font-serif { font-family: 'Playfair Display', serif; }
        #drawer { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-open { transform: translateX(0) !important; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
        }
        /* 导航栏选中状态 */
        .nav-active { border-bottom: 2px solid white; opacity: 1 !important; padding-bottom: 6px;}
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- 顶部导航 (放大字体，增加间距，恢复大气感) -->
    <header class="bg-black text-white px-10 py-8 flex justify-between items-center fixed w-full z-30">
        <div class="font-serif text-3xl tracking-tighter">Art Sense Levelup.</div>
        <nav class="hidden md:flex space-x-12 text-[13px] font-bold uppercase tracking-[0.25em]" id="main-nav">
            <button onclick="filterCategory('All')" class="nav-btn nav-active opacity-50 hover:opacity-100 transition-all" data-cat="All">discover</button>
            <button onclick="filterCategory('女性穿搭')" class="nav-btn opacity-50 hover:opacity-100 transition-all" data-cat="女性穿搭">fashion</button>
            <button onclick="filterCategory('页面排版')" class="nav-btn opacity-50 hover:opacity-100 transition-all" data-cat="页面排版">layout</button>
            <button onclick="filterCategory('家居装饰')" class="nav-btn opacity-50 hover:opacity-100 transition-all" data-cat="家居装饰">home decor</button>
        </nav>
        <button class="border border-white/40 rounded-full px-8 py-3 text-[11px] font-bold uppercase tracking-widest hover:bg-white hover:text-black transition-all">Subscribe</button>
    </header>

    <section class="hero-bg h-[80vh] flex flex-col justify-center items-center text-center text-white px-6">
        <h2 class="font-serif text-8xl md:text-9xl mb-8 tracking-tighter">Art Sense<br>Levelup.</h2>
        <p class="max-w-2xl text-gray-200 text-sm leading-loose opacity-90 tracking-widest font-medium">
            拆解全球顶尖视觉标杆。不是空洞的理论，而是你能直接套用的审美实操公式。
        </p>
    </section>

    <!-- 主体区域 -->
    <div class="max-w-7xl mx-auto py-24 px-8">
        
        <!-- 💡 恢复：收藏库与热榜切换功能区 -->
        <div class="flex justify-center space-x-16 mb-20 text-[14px] font-bold uppercase tracking-[0.2em]">
            <button class="border-b-2 border-black pb-2 text-black">今日热榜精选</button>
            <button class="text-gray-400 hover:text-black transition-colors pb-2">我的收藏库</button>
        </div>

        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-24">
            <!-- 脚本生成内容 -->
        </div>
    </div>

    <!-- 左图右文超大抽屉 -->
    <div id="drawer" class="fixed top-0 right-0 h-full w-full md:w-[90vw] max-w-[1300px] bg-white shadow-2xl z-50 transform translate-x-full border-l border-gray-100 overflow-hidden flex flex-col">
        <button onclick="closeDrawer()" class="absolute top-8 right-10 text-black bg-white/90 px-6 py-3 rounded-full shadow-md hover:bg-black hover:text-white uppercase text-[11px] font-bold tracking-widest flex items-center group z-50 transition-all border border-gray-100">
            <span class="mr-2 group-hover:-translate-x-1 transition-transform">←</span> Close
        </button>
        <div id="drawer-content" class="flex-1 overflow-hidden"></div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/70 opacity-0 pointer-events-none transition-opacity z-40" onclick="closeDrawer()"></div>

    <script>
        let allData = [];

        async function init() {
            try {
                const response = await fetch('aesthetic_data.json?t=' + Math.random());
                allData = await response.json();
                renderGallery(allData);
            } catch (e) { console.error("加载失败", e); }
        }

        function filterCategory(category) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('nav-active');
                if(btn.dataset.cat === category) btn.classList.add('nav-active');
            });
            const filteredData = category === 'All' ? allData : allData.filter(item => item.category === category);
            renderGallery(filteredData);
        }

        function renderGallery(data) {
            const gallery = document.getElementById('gallery');
            if(data.length === 0) return;

            gallery.innerHTML = data.map(item => `
                <div class="group cursor-pointer flex flex-col h-full" onclick="openDrawer('${item.id}')">
                    <div class="aspect-[4/5] overflow-hidden rounded-sm bg-gray-100 mb-8 shadow-sm">
                        <img src="${item.imageUrl}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000 grayscale-[0.15] group-hover:grayscale-0">
                    </div>
                    <div class="text-center flex-1 flex flex-col justify-between">
                        <div>
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.4em] mb-4 block">${item.category}</span>
                            <h3 class="font-serif text-3xl font-bold text-black mb-4 leading-tight">${item.title}</h3>
                        </div>
                        <p class="text-[13px] text-gray-500 font-medium tracking-wider border-t border-gray-100 pt-4 mt-4">${item.brief}</p>
                    </div>
                </div>
            `).join('');
        }

        function openDrawer(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;

            const content = document.getElementById('drawer-content');
            content.innerHTML = `
                <div class="flex flex-col md:flex-row h-full">
                    <div class="w-full md:w-1/2 h-[40vh] md:h-full bg-[#f8f9fa] flex items-center justify-center p-12 border-r border-gray-100 relative">
                        <img src="${item.imageUrl}" class="max-w-full max-h-full object-contain shadow-2xl rounded">
                    </div>
                    <div class="w-full md:w-1/2 h-[60vh] md:h-full overflow-y-auto px-12 py-20 md:px-20 md:py-24 bg-white">
                        <div class="flex items-center space-x-4 mb-10 text-[11px] font-bold uppercase tracking-[0.3em] text-gray-400">
                            <span>${item.category}</span>
                            <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                            <span class="text-black">Masterclass Analysis</span>
                        </div>
                        <h2 class="font-serif text-5xl font-bold mb-16 leading-tight">${item.title}</h2>
                        <div class="prose prose-lg max-w-none text-gray-800">
                            ${item.detailedAnalysis}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('drawer').classList.add('drawer-open');
            document.getElementById('overlay').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('overlay').classList.replace('pointer-events-none', 'pointer-events-auto');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('drawer-open');
            document.getElementById('overlay').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('overlay').classList.replace('pointer-events-auto', 'pointer-events-none');
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
