<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Sense Levelup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .drawer-open { transform: translateX(0%); }
        .drawer-closed { transform: translateX(100%); }
        .fade-in { opacity: 1; pointer-events: auto; }
        .fade-out { opacity: 0; pointer-events: none; }
        .nav-item { font-family: 'Playfair Display', serif; font-style: italic; color: #b0b0b0; text-transform: lowercase; }
        .nav-active { color: white !important; font-weight: bold; border-bottom: 2px solid white;}
        .tab-active { color: black !important; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#fafafa] text-[#191919] antialiased overflow-x-hidden font-sans">

    <nav class="bg-black text-white px-10 py-6 flex justify-between items-center sticky top-0 z-40 border-b border-white/10">
        <div class="text-3xl font-serif font-bold tracking-tight">Art Sense Levelup<span class="text-white/50 ml-1">.</span></div>
        <div class="hidden md:flex space-x-10 text-sm font-semibold">
            <a href="#" onclick="filterData('all', this)" class="nav-item nav-active transition pb-1">discover</a>
            <a href="#" onclick="filterData('女性穿搭', this)" class="nav-item hover:text-white transition pb-1">fashion</a>
            <a href="#" onclick="filterData('页面排版', this)" class="nav-item hover:text-white transition pb-1">layout</a>
            <a href="#" onclick="filterData('家居装饰', this)" class="nav-item hover:text-white transition pb-1">home decor</a>
        </div>
        <div>
            <button class="bg-transparent hover:bg-white hover:text-black border border-white text-white px-6 py-2 rounded-full text-xs font-bold transition uppercase tracking-widest">Subscribe</button>
        </div>
    </nav>

    <header class="w-full min-h-screen bg-black relative flex items-center justify-center border-b border-gray-200">
        <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=2000&q=80" class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-10 text-center text-white px-8">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Global Visual Excellence Gallery</div>
            <h1 class="text-7xl md:text-8xl font-serif font-bold mb-10 leading-[0.95]">
                Art Sense <br>
                Levelup<span class="text-white/30 ml-2">.</span>
            </h1>
            <p class="text-gray-300 font-sans max-w-xl mx-auto text-sm md:text-base leading-relaxed opacity-70">
                A definitive gallery of international design and visual excellence: an epic love story with design spanning fashion, layout, and home decor.
            </p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-8 py-10 flex justify-center space-x-12 border-b border-gray-100 text-sm font-bold">
        <button onclick="filterData('all', this)" class="sub-tab tab-active pb-1 text-black font-serif italic text-xl">今日热榜精选</button>
        <button onclick="showFavorites(this)" class="sub-tab text-gray-400 hover:text-black transition pb-1 font-serif text-xl">我的收藏库</button>
    </div>

    <main class="max-w-7xl mx-auto px-8 py-16 min-h-[50vh]">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12" id="gallery">
            <p class="text-gray-500 col-span-full text-center py-20 text-lg">正在加载审美灵感...</p>
        </div>
    </main>

    <div id="drawerOverlay" class="fixed inset-0 bg-black/70 z-50 fade-out transition-opacity duration-400" onclick="closeDrawer()"></div>
    
    <div id="detailDrawer" class="fixed top-0 right-0 h-full w-full md:w-[600px] lg:w-[800px] bg-white z-50 shadow-2xl drawer-closed transition-transform duration-400 ease-in-out flex flex-col md:flex-row border-l border-gray-100">
        <div class="w-full md:w-1/2 h-64 md:h-full bg-black flex-shrink-0 relative">
            <img id="drawerImg" src="" class="w-full h-full object-cover" alt="Detail">
            <div class="absolute inset-0 bg-black/10"></div>
        </div>
        
        <div class="w-full md:w-1/2 h-full overflow-y-auto no-scrollbar p-10 flex flex-col relative">
            <button onclick="closeDrawer()" class="absolute top-8 right-8 p-3 bg-gray-100 hover:bg-gray-200 rounded-full transition">
                <svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="mb-10 mt-6">
                <span id="drawerCat" class="text-xs font-serif font-bold text-gray-400 uppercase tracking-widest mb-3 block"></span>
                <h2 id="drawerTitle" class="text-4xl font-serif font-bold leading-tight text-black"></h2>
                <p id="drawerBrief" class="text-xl text-gray-500 mt-4 font-medium italic font-serif"></p>
            </div>
            <hr class="border-gray-200 mb-10">
            <div class="mb-10 flex-grow space-y-6">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">导师级元素拆解</h3>
                <div id="drawerAnalysis" class="text-gray-900 text-[16px] leading-relaxed space-y-5 font-medium font-sans opacity-90"></div>
            </div>
            <div id="drawerSuggestionBox" class="mb-10 bg-[#f9fafb] p-6 rounded border border-gray-200 hidden">
                <h3 class="text-sm font-bold text-blue-900 mb-3 flex items-center">
                    <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    给新手的建议
                </h3>
                <p id="drawerSuggestion" class="text-sm text-gray-700 leading-relaxed font-medium"></p>
            </div>
            <button id="favBtn" onclick="toggleFavorite()" class="w-full mt-auto bg-black text-white text-xs px-12 py-5 rounded-full hover:bg-gray-800 transition uppercase tracking-widest font-bold">收藏此灵感</button>
        </div>
    </div>

    <script>
        let allData = []; 
        let currentItem = null; 
        let favoriteIds = JSON.parse(localStorage.getItem('artSenseFavs')) || [];
        const noCacheUrl = 'aesthetic_data.json?time=' + new Date().getTime();

        fetch(noCacheUrl)
            .then(response => {
                if (!response.ok) throw new Error("HTTP 状态码: " + response.status + " (没找到文件)");
                return response.text(); // 先以纯文本形式读取，防止直接崩溃
            })
            .then(text => {
                try {
                    const data = JSON.parse(text); // 尝试将文本翻译为 JSON
                    allData = data;
                    renderGallery(allData); 
                } catch (err) {
                    // 如果翻译失败，直接把红色警告打在公屏上！
                    document.getElementById('gallery').innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <p class="text-red-600 text-2xl font-bold mb-4 font-sans">⚠️ 数据文件格式错误！</p>
                            <p class="text-gray-600 text-sm font-sans mb-2">你的 <code>aesthetic_data.json</code> 文件里存在语法错误（多写了逗号，或者少写了括号）。</p>
                            <p class="text-gray-400 text-xs font-sans bg-gray-100 inline-block p-2 rounded mt-2">系统底层报错: ${err.message}</p>
                        </div>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('gallery').innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <p class="text-red-600 text-2xl font-bold mb-4 font-sans">⚠️ 无法连接到服务器</p>
                        <p class="text-gray-600 text-sm font-sans mb-2">你的黑色服务器窗口可能被关掉了，请重新输入 py -m http.server</p>
                        <p class="text-gray-400 text-xs font-sans mt-2">${err.message}</p>
                    </div>
                `;
            });

        function renderGallery(dataArray) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; 
            if(dataArray.length === 0) {
                gallery.innerHTML = '<p class="text-gray-500 col-span-full text-center py-24 text-xl">这里空空如也~</p>';
                return;
            }
            dataArray.forEach(item => {
                const card = `
                    <div class="group cursor-pointer flex flex-col items-center text-center px-4 py-8 rounded-lg hover:bg-gray-50/50" onclick="openDrawer('${item.id}')">
                        <div class="w-full aspect-[1/1] overflow-hidden rounded bg-gray-100 relative">
                            <img src="${item.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            ${favoriteIds.includes(item.id) ? '<div class="absolute top-2 right-2 bg-black text-white text-xs px-2 py-1 rounded">已收藏</div>' : ''}
                        </div>
                        <div class="pt-6">
                            <div class="text-[10px] font-serif font-bold text-gray-500 uppercase tracking-widest mb-2">${item.category}</div>
                            <h3 class="font-serif text-xl font-bold text-black mb-2 group-hover:underline decoration-1 underline-offset-4">${item.title}</h3>
                            <p class="text-sm font-sans font-medium text-gray-500 mt-1 opacity-70">${item.brief}</p>
                        </div>
                    </div>
                `;
                gallery.innerHTML += card;
            });
        }

        function filterData(category, clickedElement) {
            if(clickedElement.classList.contains('nav-item')) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));
                clickedElement.classList.add('nav-active');
            } else if (clickedElement.classList.contains('sub-tab')) {
                document.querySelectorAll('.sub-tab').forEach(el => el.classList.remove('tab-active', 'text-black'));
                document.querySelectorAll('.sub-tab').forEach(el => el.classList.add('text-gray-400'));
                clickedElement.classList.remove('text-gray-400');
                clickedElement.classList.add('tab-active', 'text-black');
            }
            if (category === 'all') renderGallery(allData);
            else renderGallery(allData.filter(item => item.category === category));
        }

        function showFavorites(clickedElement) {
            document.querySelectorAll('.sub-tab').forEach(el => el.classList.remove('tab-active', 'text-black'));
            document.querySelectorAll('.sub-tab').forEach(el => el.classList.add('text-gray-400'));
            clickedElement.classList.remove('text-gray-400');
            clickedElement.classList.add('tab-active', 'text-black');
            renderGallery(allData.filter(item => favoriteIds.includes(item.id)));
        }

        const drawer = document.getElementById('detailDrawer');
        const overlay = document.getElementById('drawerOverlay');

        function openDrawer(itemId) {
            currentItem = allData.find(i => i.id === itemId);
            document.getElementById('drawerImg').src = currentItem.imageUrl;
            document.getElementById('drawerCat').innerText = currentItem.category;
            document.getElementById('drawerTitle').innerText = currentItem.title;
            document.getElementById('drawerBrief').innerText = currentItem.brief;
            document.getElementById('drawerAnalysis').innerHTML = currentItem.detailedAnalysis.split('<br>').map(p => `<p>${p}</p>`).join('');
            const suggBox = document.getElementById('drawerSuggestionBox');
            if (currentItem.suggestion && currentItem.suggestion.trim() !== "") {
                document.getElementById('drawerSuggestion').innerText = currentItem.suggestion;
                suggBox.classList.remove('hidden');
            } else {
                suggBox.classList.add('hidden');
            }
            updateFavButtonUI();
            drawer.classList.remove('drawer-closed');
            drawer.classList.add('drawer-open');
            overlay.classList.remove('fade-out');
            overlay.classList.add('fade-in');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawer.classList.remove('drawer-open');
            drawer.classList.add('drawer-closed');
            overlay.classList.remove('fade-in');
            overlay.classList.add('fade-out');
            document.body.style.overflow = 'auto';
            const activeTab = document.querySelector('.tab-active');
            if(activeTab && activeTab.innerText === '我的收藏库') showFavorites(activeTab);
            else {
                const activeNav = document.querySelector('.nav-active');
                if(activeNav) filterData(activeNav.innerText === 'discover' ? 'all' : activeNav.innerText, activeNav);
            }
        }

        function toggleFavorite() {
            if (!currentItem) return;
            const index = favoriteIds.indexOf(currentItem.id);
            if (index > -1) favoriteIds.splice(index, 1);
            else favoriteIds.push(currentItem.id);
            localStorage.setItem('artSenseFavs', JSON.stringify(favoriteIds));
            updateFavButtonUI();
        }

        function updateFavButtonUI() {
            const btn = document.getElementById('favBtn');
            if (favoriteIds.includes(currentItem.id)) {
                btn.innerText = "已收藏 (点击取消)";
                btn.classList.replace('bg-black', 'bg-gray-400');
                btn.classList.replace('hover:bg-gray-800', 'hover:bg-gray-500');
            } else {
                btn.innerText = "收藏此灵感";
                btn.classList.replace('bg-gray-400', 'bg-black');
                btn.classList.replace('hover:bg-gray-500', 'hover:bg-gray-800');
            }
        }
    </script>
</body>
</html>
