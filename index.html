<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Sense Levelup.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; }
        .font-serif { font-family: 'Playfair Display', serif; }
        #drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-open { transform: translateX(0) !important; }
        /* 恢复图二的背景样式 */
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=1600&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="bg-black text-white px-8 py-6 flex justify-between items-center fixed w-full z-30">
        <div class="font-serif text-2xl tracking-tighter">Art Sense Levelup.</div>
        <nav class="hidden md:flex space-x-10 text-[11px] font-bold uppercase tracking-[0.2em] italic">
            <a href="#" class="border-b border-white pb-1">discover</a>
            <a href="#" class="opacity-60 hover:opacity-100 transition-opacity">fashion</a>
            <a href="#" class="opacity-60 hover:opacity-100 transition-opacity">layout</a>
            <a href="#" class="opacity-60 hover:opacity-100 transition-opacity">home decor</a>
        </nav>
        <button class="border border-white/30 rounded-full px-6 py-2 text-[10px] font-bold uppercase tracking-widest hover:bg-white hover:text-black transition-all">Subscribe</button>
    </header>

    <section class="hero-bg h-[80vh] flex flex-col justify-center items-center text-center text-white px-6">
        <h2 class="font-serif text-8xl md:text-9xl mb-8 tracking-tighter animate-fade-in">Art Sense<br>Levelup.</h2>
        <p class="max-w-xl text-gray-300 text-sm leading-relaxed opacity-80 tracking-wide font-medium">
            A definitive gallery of international design and visual excellence: an epic love story with design spanning fashion, layout, and home decor, from the inner circle of the...
        </p>
    </section>

    <div class="max-w-7xl mx-auto py-24 px-8">
        <div class="flex justify-center space-x-12 mb-20 text-[11px] font-bold uppercase tracking-[0.2em]">
            <button class="border-b-2 border-black pb-2">今日热榜精选</button>
            <button class="text-gray-300 hover:text-black transition-colors pb-2">我的收藏库</button>
        </div>
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-20">
            </div>
    </div>

    <div id="drawer" class="fixed top-0 right-0 h-full w-full md:w-[600px] bg-white shadow-2xl z-50 transform translate-x-full border-l border-gray-100 overflow-y-auto">
        <div class="p-12">
            <button onclick="closeDrawer()" class="mb-12 text-gray-400 hover:text-black uppercase text-[10px] tracking-widest flex items-center group">
                <span class="mr-3 group-hover:-translate-x-1 transition-transform">←</span> Back to Gallery
            </button>
            <div id="drawer-content">
                </div>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/40 opacity-0 pointer-events-none transition-opacity z-40" onclick="closeDrawer()"></div>

    <script>
        let allData = [];

        async function init() {
            try {
                const response = await fetch('aesthetic_data.json');
                allData = await response.json();
                renderGallery(allData);
            } catch (e) { console.error(e); }
        }

        function renderGallery(data) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = data.map(item => `
                <div class="group cursor-pointer" onclick="openDrawer('${item.id}')">
                    <div class="aspect-[4/5] overflow-hidden rounded-sm bg-gray-100 mb-8 shadow-sm">
                        <img src="${item.imageUrl}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000 grayscale-[0.3] group-hover:grayscale-0">
                    </div>
                    <div class="text-center">
                        <span class="text-[9px] font-bold text-gray-400 uppercase tracking-[0.4em] mb-3 block italic">${item.category}</span>
                        <h3 class="font-serif text-3xl font-bold text-black mb-3 leading-tight">${item.title}</h3>
                        <p class="text-xs text-gray-400 font-medium tracking-wide">${item.brief}</p>
                    </div>
                </div>
            `).join('');
        }

        function openDrawer(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;

            const content = document.getElementById('drawer-content');
            content.innerHTML = `
                <div class="mb-12 aspect-video rounded-sm overflow-hidden shadow-2xl">
                    <img src="${item.imageUrl}" class="w-full h-full object-cover">
                </div>
                <h2 class="font-serif text-4xl font-bold mb-6 leading-tight">${item.title}</h2>
                <div class="flex items-center space-x-4 mb-12 text-[10px] font-bold uppercase tracking-[0.3em] text-gray-300">
                    <span>${item.category}</span>
                    <span class="w-1 h-1 bg-gray-200 rounded-full"></span>
                    <span>Pro Analysis</span>
                </div>
                
                <section>
                    <h4 class="text-[11px] font-bold uppercase tracking-widest text-black/20 mb-8 border-b border-gray-50 pb-4 italic">导师级元素拆解</h4>
                    <div class="text-[15px] text-gray-700 leading-relaxed font-medium">
                        ${item.detailedAnalysis}
                    </div>
                </section>
            `;

            document.getElementById('drawer').classList.add('drawer-open');
            document.getElementById('overlay').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('overlay').classList.replace('pointer-events-none', 'pointer-events-auto');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('drawer-open');
            document.getElementById('overlay').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('overlay').classList.replace('pointer-events-auto', 'pointer-events-none');
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
